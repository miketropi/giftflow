name: Build & Deploy WP Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Setup environments
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      # ---------------------------
      # Build
      # ---------------------------
      - run: npm install
      - run: npm run build
      - run: composer run build
      - run: npm run build:package

      # ---------------------------
      # Extract version
      # ---------------------------
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ---------------------------
      # Validate package
      # ---------------------------
      - name: Validate version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version"
            exit 1
          fi

          unzip giftflow.zip -d build

          FILE_VERSION=$(grep -i "Version:" build/giftflow/giftflow.php | head -1 | awk -F': ' '{print $2}' | tr -d '\r')

          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "Version mismatch"
            exit 1
          fi

          echo "Validation passed"

      # ---------------------------
      # GitHub Release
      # ---------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.MY_GH_TOKEN }}
          files: giftflow.zip
          generate_release_notes: true

      # ---------------------------
      # Install SVN
      # ---------------------------
      - name: Install SVN
        run: sudo apt-get install subversion -y

      # ---------------------------
      # 🚀 FAST WordPress.org Deploy
      # ---------------------------
      - name: Deploy to WordPress.org
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -e

          PLUGIN_SLUG="giftflow"

          echo "Deploying version $VERSION"

          # ✅ checkout ONLY trunk (FAST)
          svn checkout \
            https://plugins.svn.wordpress.org/$PLUGIN_SLUG/trunk \
            svn-trunk \
            --depth immediates

          # unzip package
          rm -rf build
          unzip giftflow.zip -d build

          # sync files
          rsync -rc --delete build/giftflow/ svn-trunk/

          cd svn-trunk

          svn add . --force

          svn commit -m "Deploy trunk version $VERSION" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert

          # ✅ SERVER-SIDE TAG (NO DOWNLOAD)
          svn copy \
            https://plugins.svn.wordpress.org/$PLUGIN_SLUG/trunk \
            https://plugins.svn.wordpress.org/$PLUGIN_SLUG/tags/$VERSION \
            -m "Tagging version $VERSION" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert

          echo "✅ Deployment completed"